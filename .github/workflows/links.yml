# Check for broken links after deployment and on a weekly schedule.
# Creates a GitHub issue when broken links are found.
name: Links

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    # Only run on successful deploy or scheduled trigger
    if: >-
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--config lychee.toml https://env1bot.github.io"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: "Broken links detected"
          content-filepath: ./lychee/out.md
          labels: bug,automated
